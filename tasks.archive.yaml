- id: fix/round-packet-remote-visibility
  session_id: c555cb27-f338-4324-abc1-d3aeef048585
  round: 2026-07-16-fix-wave
  result: '2차 위임 apply(594b8ad, 사용자 waiver 1건) — publication 게이트(실 bare-remote RED-first),
    bind 단계 분리, 엄격 Reviewing 파서, corrupt loud. edge 우회 5건은 fix/publication-gate-bypasses로
    이관. 기록: .waystone/delegations/20260716T101557Z-fix-round-packet-remote-visibility'
  accept:
  - round skill의 packet 흐름이 request 작성(정확한 Reviewing 줄 형식 명시) → 커밋 → push → remote
    verify → 보고 순서로 재규정되고, 전달 안내가 remote에서 repo를 읽는 리뷰어 기준으로 서술된다
  - round close의 binding target_sha와 packet Reviewing sha의 의미론이 일원화되어 문서와 코드가 일치한다
  - ingest에서 packet Reviewing 줄 파싱 실패가 조용히 스킵되지 않고 stderr 경고를 낸다
  - 전체 테스트 스위트(신규·갱신 계약 테스트 포함)와 ruff F401,F841 검사가 통과한다
  - round의 publication 게이트가 push된 HEAD 트리에 해당 round의 request 파일과 binding이 존재함을 확인한다
    — 미추적·부분 커밋 상태로는 통과하지 않는다
  - Reviewing 줄 파싱은 개행이나 가변 공백을 허용하지 않는 정확한 단일 줄 형식만 수용한다
  - malformed 또는 corrupt binding·Reviewing은 improve 투영을 포함한 모든 소비 지점에서 조용히 넘어가지 않고
    경고 또는 fail-loud로 드러난다 (corrupt 사이드카 포함)
  - publication 계약이 실제 temp remote를 사용한 subprocess 수준 테스트로 RED-first 검증된다
  scope:
  - skills
  - scripts
  notes: '세 번째 dogfooding finding (2026-07-16, 첫 round 마감에서 사용자 적발). 부수 지점 1: round
    close가 찍는 binding target_sha(close 시점 HEAD)와 packet의 Reviewing(closeout 커밋)이 한
    커밋 어긋남 — close→closeout→request의 sha 의미론 일원화 필요. 부수 지점 2 (ingest에서 확인): packet의
    ''Reviewing:'' 줄에 부연 텍스트를 붙이면 parse_packet_request_binding 정규식이 조용히 실패해 binding
    갱신이 무기록 스킵됨 — 형식 이탈 시 stderr 경고 필요 + skill에 정확한 줄 형식 명시. skill Step 4의 순서를 ''request
    작성(Reviewing=closeout sha) → 커밋 → push → remote verify → 보고''로 재규정 + 전달 안내를 remote
    경로 기준으로. 대상: skills/round/SKILL.md, scripts/review.py.'
  title: 'round skill packet 모드: 리뷰 요청 순서가 ''작성→커밋/푸시→보고''가 아니라 ''closeout 푸시→작성→로컬
    전달''이라 remote에서 repo를 읽는 리뷰어에게 packet이 안 보임 — 요청 파일을 커밋·푸시 후 보고하도록 skill 순서 수정'
  status: done
  severity: major
