  - 자기선언 identity와 reviewer_configured 판정(review-skipped-closes-v1) 및 request binding
    reviewers 필드의 관계가 재정의되어 문서와 코드가 일치한다 — profile reviewer binding의 잔여 역할도 명시된다
  - 전체 테스트 스위트(신규 계약 테스트는 RED-first)와 ruff F401,F841 검사가 통과한다
  - 자기선언이 bind된 route 또는 구성된 리터럴 reviewer와 일치할 때만 reviewer_configured=True로 기록되고,
    선언 부재나 불일치는 guard(review-skipped-closes-v1)의 configured-feedback으로 인정되지 않으며 경고를
    남긴다 (guard 약화 금지)
  - 강제 재ingest(--force)는 feedback 파일과 canonical overlay 이벤트의 reviewer identity를 일관되게
    갱신한다 (모순 기록 금지, identity 정정 경로 테스트 포함)
  - feedback 이벤트는 자신이 소비한 request binding의 결속 증거(대상 sha 또는 digest)를 기록해 round 재준비·재사용
    시 회신-binding 불일치를 탐지할 수 있다
  - improve의 reviewer 관련 투영이 자기선언 identity와 effort를 소비한다
  - invalid UTF-8 등 손상된 선언은 추측 없이 unknown으로 기록되고 경고를 남긴다 (대체문자 identity 금지)
  - 선언 위치 규칙(첫 비어있지 않은 줄)이 파서, round 스킬, review 스킬, 템플릿 네 표면에서 동일하게 서술되고 템플릿 예시가 파서를
    실제로 통과하는 round-trip 테스트가 있다
