- id: fix/publication-gate-bypasses
  accept:
  - publication 게이트는 working tree가 아니라 HEAD tree를 증거 소스로 사용한다 — request와 binding을
    git ls-tree의 정확한 lexical path로 찾아 HEAD blob에서 직접 읽어 파싱하고, symlink mode는 거부하며,
    사이드카 후보 열거도 filesystem glob이 아니라 HEAD tree에서 한다
  - skip-worktree나 assume-unchanged로 위장한 tracked 변경이 게이트를 통과하지 못한다
  - round id 재사용 시 binding이 현재 closeout에 결속됨이 검증된다 (조상 검사만으로 불충분)
  - improve의 파일명과 내장 round_id 불일치 사이드카가 무경고 오귀속되지 않는다 (PR freeze 동일)
  - 들여쓴 중복 Reviewing 줄이 모호성으로 탐지된다
  - 삭제된 upstream의 stale tracking ref로 게이트가 통과하지 않는다
  - 전체 테스트 스위트(신규 계약 테스트는 RED-first)와 ruff F401,F841 검사가 통과한다
  - publication 게이트의 config(review.mode, reviews_dir)는 working tree가 아니라 검증 대상 HEAD의
    .waystone.yml에서 읽는다 — 위장된 config 변경이 게이트 대상을 재지정할 수 없다
  - closeout 결속이 merge 부모 트릭에 안전하다 — 단일 부모 publication 커밋 요구 또는 first-parent 체인 검증으로,
    낡은 closeout을 first-parent에 둔 merge가 통과하지 못한다 (real-repo 테스트)
  - publication과 improve가 동일한 사이드카 파일명 규칙(binding.json 또는 binding-N.json만)을 단일 소스로
    공유한다
  - upstream 존재·포함 확인이 축약 DWIM 이름이 아니라 완전한 refs/remotes 참조로 수행되어 tag 섀도잉이나 비활성 refspec
    잔존 ref에 속지 않는다
  - HEAD 열거가 게이트에 필요한 직계 자식으로 한정되고 무관 경로의 비UTF-8 이름이나 대형 첨부 트리가 게이트를 실패시키지 않는다
  - 발행 커밋의 변경 경로가 해당 라운드 packet 파일(request/binding sidecar)로 제한되며, 그 외 경로 변경이 포함되면
    게이트가 거부한다
  - 게이트의 모든 git 객체 접근이 시작 시 핀한 불변 SHA 기준으로 일관 수행되고(HEAD 재해석 금지), refs/replace/graft
    치환이 무효화된 상태에서 검증된다
  - negative refspec으로 fetch에서 제외된 stale remote-tracking ref는 containment 근거로 인정되지
    않는다
  - sidecar 최신 선택이 timestamp 문자열이 아닌 불변 sequence 우선으로 정렬되어 linear extend/re-close가
    통과한다 (positive 재-close 회귀 테스트 포함)
  - reviews-tree 열거와 binding-N suffix 파싱이 개수·크기 bounded이며 oversized suffix가 crash가
    아닌 명시적 거부로 처리된다
  - reviews_dir 경로 검증이 runtime config loader와 단일 공유 규칙이고, stale-closeout-첫부모 거부를 실제
    재현하는 fixture가 존재한다
  notes: '사용자 재정(2026-07-17, audit 부위 1): 조상-추론 구조를 폐기하고 직접-결속 새 항아리로 재설계 — fix/publication-gate-direct-binding으로
    재등록, 구현은 Fable fork. 기존 17기준 중 로컬 공격자 4건(refs/replace·negative-refspec·merge-parent·bounded
