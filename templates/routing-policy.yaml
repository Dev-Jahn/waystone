schema: waystone-routing-policy-1
questions:
  - id: reasoning
    prompt: What level of reasoning does the task require?
    prefer:
      roles: [implementer, reviewer]
      executions: [forked-subagent, external-runner]
  - id: context-inheritance
    prompt: Must the worker inherit the current context?
    prefer:
      roles: [implementer, clerk]
      executions: [forked-subagent]
  - id: independent-perspective
    prompt: Does the task require an independent perspective?
    prefer:
      roles: [verifier, reviewer]
      executions: [clean-subagent, external-runner]
  - id: bounded-scope
    prompt: Is the scope clear and bounded?
    prefer:
      roles: [implementer, clerk]
      executions: [clean-subagent, deterministic-workflow, external-runner]
  - id: repetitive-tools
    prompt: Is repetitive tool execution the main work?
    prefer:
      roles: [clerk]
      executions: [deterministic-workflow]
  - id: retry-cost
    prompt: How costly is a failed attempt and retry?
    prefer:
      roles: [orchestrator, verifier]
      executions: [clean-subagent, deterministic-workflow]
  - id: independent-verification
    prompt: Who independently verifies final quality?
    prefer:
      roles: [verifier, reviewer]
      executions: [clean-subagent, external-runner]
  - id: budget-sensitivity
    prompt: Is the user sensitive to execution budget?
    prefer:
      roles: [orchestrator, clerk]
      executions: [deterministic-workflow]
roles:
  main: Own routing and final acceptance.
  orchestrator: Coordinate bounded bundles.
  implementer: Implement scope and produce verification evidence.
  clerk: Perform low-ambiguity repeatable work.
  verifier: Independently check acceptance and risk.
  reviewer: Adversarially inspect diffs and artifacts.
