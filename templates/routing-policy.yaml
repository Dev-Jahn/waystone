schema: waystone-routing-policy-2
questions:
  - id: reasoning
    prompt: Does this work require independent reasoning beyond bounded execution?
  - id: context-inheritance
    prompt: Is the semantic context transfer complete and provenance-preserving?
  - id: independent-perspective
    prompt: Is an independent perspective required by the selected stage?
  - id: bounded-scope
    prompt: Is the scope bounded enough for the selected execution form?
  - id: repetitive-tools
    prompt: Is the work repetitive and deterministic?
  - id: retry-cost
    prompt: Would a failed transfer or retry be materially expensive?
  - id: independent-verification
    prompt: Does the assurance plan require independent verification?
  - id: budget-sensitivity
    prompt: Is the selected route within the owner budget?
roles:
  coordinator: Main owns routing, acceptance, and final decisions.
  worker: Implement and verify the declared scope.
  verifier: Verify independently against frozen inputs.
  reviewer: Review adversarially and report evidence-backed claims.
