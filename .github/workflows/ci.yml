name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate dual plugin contracts
        run: |
          set -euo pipefail
          jq -e '.name == "waystone" and (.version | test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))' \
            .claude-plugin/plugin.json >/dev/null
          jq -e '
            .name == "waystone" and
            .skills == "./skills/" and
            (has("hooks") | not)
          ' .codex-plugin/plugin.json >/dev/null
          test "$(jq -r .version .claude-plugin/plugin.json)" = \
            "$(jq -r .version .codex-plugin/plugin.json)"
          jq -e '
            .hooks | keys | sort ==
            ["PostToolUse", "PreCompact", "PreToolUse", "SessionEnd", "SessionStart"]
          ' hooks/hooks.json >/dev/null
          test -x bin/waystone
          test -x bin/waystone-codex
          test -f templates/agents-md-stanza.md
          test -f templates/verifier-output-schema.json

  tests:
    runs-on: ubuntu-latest
    if: github.ref_name != 'main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Run test suite
        run: uv run scripts/tests/run_tests.py

  codex-install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Codex CLI
        run: npm install --global @openai/codex@0.144.4
      - name: Install checkout as a Codex plugin
        run: |
          set -euo pipefail
          marketplace="$RUNNER_TEMP/waystone-marketplace"
          codex_home="$RUNNER_TEMP/codex-home"
          mkdir -p "$marketplace/.agents/plugins" "$marketplace/plugins" "$codex_home"
          cp -R "$GITHUB_WORKSPACE" "$marketplace/plugins/waystone"
          jq -n '{
            name: "waystone-ci",
            interface: {displayName: "Waystone CI"},
            plugins: [{
              name: "waystone",
              source: {source: "local", path: "./plugins/waystone"},
              policy: {installation: "AVAILABLE", authentication: "ON_INSTALL"},
              category: "Developer Tools"
            }]
          }' > "$marketplace/.agents/plugins/marketplace.json"
          CODEX_HOME="$codex_home" codex plugin marketplace add "$marketplace"
          CODEX_HOME="$codex_home" codex plugin list --marketplace waystone-ci --available --json \
            | jq -e '.available[] | select(.name == "waystone")' >/dev/null
          CODEX_HOME="$codex_home" codex plugin add waystone@waystone-ci --json \
            | jq -e '.name == "waystone" and .pluginId == "waystone@waystone-ci"' >/dev/null
          CODEX_HOME="$codex_home" codex plugin list --marketplace waystone-ci --json \
            | jq -e '.installed[] | select(.name == "waystone" and .installed == true)' >/dev/null
