    accept: ["ingest_round_binding이 malformed freeze filename에 대해 improve._round_review_sidecars와 동일한 fallback owner 파생 규칙을 corrupt 판정보다 먼저 적용한다 — 파생 owner가 요청 round와 다르면 skip, 같을 때만 corrupt (RED: prefix가 겹치는 foreign round의 손상 파일이 healthy round의 ingest를 corrupt로 만드는 현행 동작을 입증한 뒤 반전)", "freeze/demotion sidecar의 glob 열거와 owner 판정이 공용 라우팅 함수 하나로 일원화되어, 동일 디렉터리에 대해 ingest 투영과 improve 투영이 동일한 owner 판정과 동일한 round 결론을 낸다 (RED)", "자기 round의 진짜 손상 파일은 여전히 corrupt로 판정된다 — 위양성(과잉 차단) 완화가 위음성(stale 승격)으로 넘어가지 않는다 (무회귀 + RED)", "demotion 루프의 identity=None 처리도 동일 규칙을 따른다 — 같은 파일군에 관대 규칙과 corrupt 규칙이 공존하지 않는다", "전체 테스트 스위트 green + ruff F401,F841 clean", "fallback owner는 형식 검사만으로 확정하지 않는다 — 실제 존재하는 round inventory에 대해 검증하고, 존재하지 않거나 모호한 owner로는 재귀속하지 않는다. 판별 불가한 파일은 요청 round의 명시적 quarantine(corrupt/unknown)으로 남으며, 어떤 경우에도 손상 파일이 조용히 사라져 요청 round가 낡은 cycle 위에서 explicit이 되지 않는다 (RED: 'R-freeze-<tail>-freeze-<x>.binding.json' 형태로 R의 최신 cycle을 손상시켰을 때 base에서는 R이 corrupt인데 수정 후 이전 cycle explicit으로 바뀌는 위음성 회귀를 입증한 뒤 반전)", "freeze sidecar가 없고 같은 round의 malformed demotion만 있는 상태에서도 ingest와 improve가 동일한 결론을 낸다 — ingest는 missing-pr-freeze-sidecar를 반환하기 전에 owner가 요청 round인 demotion route를 검사한다 (RED)", "improve의 sidecar 파생 owner가 실재하지 않는 phantom round key를 review coverage 집계·리포트 행에 만들어내지 않는다", "[성질] 단조성: reviews 디렉터리에 파일을 추가하는 것은 어떤 라운드의 기존 corrupt/unknown 판정도 제거하지 못한다. 특히 새 라운드의 정상 산출물(-request.md 등)이 생기는 것만으로 다른 라운드의 corruption이 사라지거나 낡은 cycle이 explicit으로 승격되어서는 안 된다 (RED: R이 corrupt인 상태에서 prefix가 겹치는 새 라운드 F의 request 파일 추가만으로 R이 explicit이 되는 현행 동작 입증 후 반전)", "[성질] 단일 귀속: 하나의 sidecar 파일은 최대 한 라운드에 귀속된다. 귀속을 확정할 수 없는 파일은 여러 라운드로 fan-out되지 않고 unattributable로 격리되며, 그 사실이 판독 결과에 드러난다 (RED: 'F-freeze-.binding.json' 형태 파일 하나가 prefix 일치하는 모든 라운드를 corrupt로 만드는 현행 동작 입증 후 반전)", "[성질] 투영 동치: ingest와 improve는 동일한 디렉터리 상태에 대해 동일한 귀속과 동일한 라운드별 결론을 낸다. 두 경로가 서로 다른 inventory 출처(호출자 제공 집합 vs 별도 디렉터리 스캔)를 쓰지 않으며, PR 모드에서 request binding이 reviews 디렉터리 밖에 저장되는 실제 구조에서도 성립한다 — 회귀 테스트는 prepared_request_path(mode='pr')의 실제 저장 구조로 구성한다 (RED)", "[성질] 위음성 금지: 위 완화 중 어느 것도 '자기 라운드의 손상 증거가 사라져 그 라운드가 낡은 cycle 위에서 건강해 보이는' 결과를 만들지 않는다. 판별 불가는 항상 해당 라운드의 unknown으로 남는다", "구현 방식은 지정하지 않는다 — 위 네 성질을 동시에 만족하면 payload 기반 귀속·filename escaping·owner manifest 중 무엇이든 좋다. 다만 선택한 방식이 네 성질을 왜 만족하는지 커밋 메시지에 근거를 남긴다", "[성질] 신뢰 판정은 파일시스템 메타데이터에 결속하지 않는다 — mtime/ctime/inode/디렉터리 stat/열거 순서 등 git으로 전달되지 않고 재파생 불가능한 값을 귀속·단조성·권위 판정의 근거로 쓰지 않는다. 판정 근거는 파일 내용, 파일명, 그리고 git-tracked 사실에서만 나온다. (근거: git clone/checkout이 mtime을 재작성하므로 다중 머신에서 보장이 소멸 — round-5 JW-GPT-013의 디렉터리 stat→내용 digest 교훈과 동일 계열)", "각 성질마다 RED를 먼저 제시한다 — base 코드에서 해당 성질이 깨짐을 재현한 명령과 출력을 보고에 포함한 뒤 반전을 보인다. 신규 API 부재로 인한 ERROR는 행동 RED로 인정하지 않으며, 그 경우 base에서 관측 가능한 형태로 결함을 재현한다"]
