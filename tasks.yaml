    title: "verifier session guard 경화: boundary_check/tasks_read_nudge 등 미가드 hook 표면, companion broker의 guard env 수명 범위, RUN 단계 구현자 세션의 .waystone 시딩(무해하나 무기록) — 적대 리뷰 major 4건의 후속 처리"
    status: "pending"
