    accept: ["trusted remote v1 supersession의 검출·영속화가 공용 함수 하나로 추출되고, remote classification을 수행하는 모든 production online 경로(최소 review status, round merge)가 그 함수를 호출한다 (RED: merge 경로에서 supersession 관측 후 demotion sidecar가 생성되지 않음을 입증한 뒤 반전)", "merge가 supersession을 관측한 뒤에는 offline 투영(ingest_round_binding, improve._review_binding)이 기존 v2 digest를 explicit exact-generation으로 재주장하지 않는다 — online 판정과 offline 판정이 일치한다 (RED)", "demotion 영속화에 실패한 경우(쓰기 불가 등) silent 통과 금지 — 관측 사실이 typed 실패/차단으로 표면화되어, 기록되지 않은 supersession이 이후 offline에서 explicit으로 되살아나는 경로가 남지 않는다", "demotion sidecar의 strict filename↔content identity 계약과 corrupt 격리 동작 무회귀", "merge gate의 기존 skew 차단 동작 무회귀 (cycle_version_skew_reason 소비)", "전체 테스트 스위트 green + ruff F401,F841 clean", "cycle_conflict=True인 late-v1 supersession(같은 cycle의 v1 marker가 다른 base_sha/target_sha/reviewers를 가져 core contract가 갈리는 변형)도 demotion 영속화 대상이다 — conflict를 영속화 제외 조건으로 쓰지 않는다. 식별 가능한 모든 v2 contract를 demote하고, 식별·기록이 불가능하면 typed 실패로 차단한다 (RED: conflict 변형에서 sidecar 0개 생성 + offline이 explicit 재주장함을 입증한 뒤 반전)", "base 정책(PR base SHA에서 읽은 권위 정책)을 읽지 못한 merge는 demotion을 기록하지 않는다 — merge._gather의 로컬 load_config fallback은 게이트 facts 계산 전용이며 persistence 경로에 전달되지 않는다. 비권위 로컬 설정이 영구 evidence를 변경할 수 없다 (RED: base policy 조회 실패 + 로컬 전용 operator 조합에서 sidecar가 생성됨을 입증한 뒤 반전)", "remote marker를 읽어 cycle을 분류하는 production online 경로는 approve()를 포함해 전부 공용 분류·영속화 함수를 경유한다 — latest_cycle()을 직접 호출해 supersession 사유를 버리는 경로가 남지 않는다. approve는 영속화가 실패하면 승인 marker를 게시하지 않는다 (RED: late-v1 supersession 상태에서 approve가 sidecar 없이 성공함을 입증한 뒤 반전)", "demotion fan-out은 all-or-nothing이다 — 대상 v2 contract 중 일부만 demote되고 나머지가 explicit으로 남는 부분 상태가 존재하지 않는다 (RED: 다중 contract 중간 write 실패에서 부분 demotion 상태 입증 후 반전)", "write 실패 회귀 테스트는 실제 stale-revival 조건을 구성한다 — 로컬 v2 freeze/request sidecar가 존재하는 상태에서 영속화가 실패했을 때 online이 차단되고 부분 상태가 남지 않음을 검증한다. 단 reviews_dir이 통째로 unwritable인 경우 offline projection이 supersession을 알 수 없음은 원리적 한계로 수용하고 계약에 명시한다(방어선은 online 차단과 부분 상태 부재)", "[성질] 우회 불가능: remote marker로 review cycle을 분류하는 공개 경로가 하나뿐이다. latest_cycle·next_cycle_number를 포함해 모든 분류 진입점이 그 chokepoint를 경유하며, '분류만 하고 관측을 기록하지 않는' 공개 함수가 남지 않는다 — 새 호출자가 추가되어도 자동으로 규율을 따른다. freeze/approve/status/merge 전부 해당 (RED: freeze가 supersession을 보고도 기록 없이 새 cycle을 게시함을 입증 후 반전)", "[성질] 관측 기록의 원자성: 한 번의 관측은 대상 전체를 담은 하나의 레코드를 원자적으로 쓴다. 개별 파일을 순차 생성한 뒤 보상 삭제하는 구조를 쓰지 않는다. 불완전한 배치는 그 자체로 모든 대상의 unknown 근거가 되어야 하며, 기존 demotion이 일부 존재하거나 정리(unlink)가 실패한 경우에도 어떤 대상도 explicit으로 투영되지 않는다 (RED: 대상 2건 중 1건 기존 존재 + 나머지 쓰기 실패에서 부분 상태 입증 후 반전)", "[성질] demotion 범위 정확성: demotion 대상은 superseding v1과 같은 cycle에서 그 marker보다 앞선 v2 contract로 한정한다. 다른 cycle·다른 round의 유효한 exact-generation 증거를 손상시키지 않는다 — 최신 cycle이 v1-only이고 v2가 과거 cycle에만 있으면 online gate는 계속 차단하되 과거 증거는 건드리지 않는다 (RED: 별도 cycle의 v1이 무관한 과거 round의 cycle-1 contract를 demote함을 입증 후 반전)", "구현 방식은 지정하지 않는다 — 위 세 성질을 동시에 만족하면 manifest·transaction marker·단일 레코드 무엇이든 좋다. 선택 근거를 커밋 메시지에 남긴다"]
